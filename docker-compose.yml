version: '3.8'

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: blogging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogging"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - EventStore__Provider=marten
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=blogging;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
